name: Publish polymarket-cli to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: uv run --no-project python -m unittest discover -s tests -v

      - name: Build distributions
        run: uv build

      - name: Smoke test built wheel
        run: uvx --from dist/polymarket_cli-*.whl pmkt --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/polymarket-cli
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
